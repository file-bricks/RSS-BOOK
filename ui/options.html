<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>RSS:BOOK Einstellungen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; color: #1a1a1a; max-width: 640px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    h1 span { color: #e63946; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    h2 { font-size: 16px; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #e63946; }
    .add-section { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-section input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
    button:hover { background: #f5f5f5; }
    button.primary { background: #e63946; color: #fff; border-color: #e63946; }
    button.primary:hover { background: #c5303c; }
    button.danger { color: #e63946; border-color: #e63946; }
    button.danger:hover { background: #fef2f2; }
    .feed-card { border: 1px solid #e5e5e5; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .feed-card.disabled { opacity: 0.5; }
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .feed-title { font-weight: 600; font-size: 14px; }
    .feed-url { font-size: 12px; color: #888; word-break: break-all; margin-bottom: 8px; }
    .feed-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 12px; }
    .feed-controls label { display: flex; align-items: center; gap: 4px; }
    .feed-controls input[type="number"] { width: 70px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px; }
    .settings-section { margin-bottom: 16px; }
    .settings-section label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .settings-section input[type="number"] { width: 80px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px; }
    .empty { color: #999; font-style: italic; padding: 16px; text-align: center; }
    .status { font-size: 12px; color: #2a9d8f; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>RSS<span>:</span>BOOK</h1>
  <div class="subtitle">Einstellungen</div>

  <h2>Globale Einstellungen</h2>
  <div class="settings-section">
    <label>
      <input type="checkbox" id="updateOnStartup" checked>
      Bei Browserstart alle Feeds aktualisieren
    </label>
    <label>
      Globales Intervall (Minuten, 0 = nur manuell/Start):
      <input type="number" id="globalInterval" value="0" min="0">
    </label>
  </div>
  <button id="saveSettings">Einstellungen speichern</button>
  <div id="settingsStatus" class="status"></div>

  <h2>Neuen Feed hinzufügen</h2>
  <div class="add-section">
    <input id="feedUrl" type="url" placeholder="https://example.com/feed.xml">
    <button id="addBtn" class="primary">Hinzufügen</button>
  </div>

  <h2>Feeds</h2>
  <div id="feedList"></div>

  <script src="options.js" type="module"></script>
</body>
</html>
