<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RSS:BOOK</title>
  <style>
    :root {
      --bg: #fff;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #e5e5e5;
      --input-border: #ddd;
      --input-bg: #fff;
      --btn-bg: #fff;
      --btn-hover: #f5f5f5;
      --btn-border: #ddd;
      --accent: #e63946;
      --accent-hover: #c5303c;
      --success: #2a9d8f;
      --error: #d32f2f;
      --card-bg: #fff;
      --section-bg: #fafafa;
      --info-bg: #f0f4f8;
      --info-border: #d0d8e0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #e0e0e0;
        --text-muted: #999;
        --border: #333;
        --input-border: #444;
        --input-bg: #2a2a2a;
        --btn-bg: #2a2a2a;
        --btn-hover: #333;
        --btn-border: #444;
        --accent: #e63946;
        --accent-hover: #ff4d5a;
        --success: #4ecdc4;
        --error: #ff6b6b;
        --card-bg: #252525;
        --section-bg: #222;
        --info-bg: #1a2530;
        --info-border: #2a3a4a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; color: var(--text); background: var(--bg); max-width: 640px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
    h2 { font-size: 16px; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--accent); }
    .add-section { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-section input { flex: 1; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 4px; font-size: 13px; background: var(--input-bg); color: var(--text); }
    button { padding: 8px 16px; border: 1px solid var(--btn-border); border-radius: 4px; background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 13px; }
    button:hover { background: var(--btn-hover); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); }
    button.danger { color: var(--accent); border-color: var(--accent); }
    button.danger:hover { background: var(--accent); color: #fff; }
    .feed-card { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; background: var(--card-bg); }
    .feed-card.disabled { opacity: 0.5; }
    .feed-card.has-error { border-color: var(--error); }
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .feed-title { font-weight: 600; font-size: 14px; }
    .feed-url { font-size: 12px; color: var(--text-muted); word-break: break-all; margin-bottom: 8px; }
    .feed-error { font-size: 12px; color: var(--error); margin-bottom: 8px; padding: 4px 8px; background: color-mix(in srgb, var(--error) 10%, transparent); border-radius: 3px; }
    .feed-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 12px; }
    .feed-controls label { display: flex; align-items: center; gap: 4px; }
    .feed-controls input[type="number"] { width: 70px; padding: 4px 6px; border: 1px solid var(--input-border); border-radius: 3px; background: var(--input-bg); color: var(--text); }
    .feed-actions { display: flex; gap: 6px; margin-top: 8px; }
    .feed-actions button { font-size: 11px; padding: 4px 10px; }
    .settings-section { margin-bottom: 16px; }
    .settings-section label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .settings-section input[type="number"], .settings-section input[type="text"] { width: 160px; padding: 4px 6px; border: 1px solid var(--input-border); border-radius: 3px; background: var(--input-bg); color: var(--text); }
    .info-box { font-size: 12px; color: var(--text-muted); background: var(--info-bg); border: 1px solid var(--info-border); border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; }
    .empty { color: var(--text-muted); font-style: italic; padding: 16px; text-align: center; }
    .status { font-size: 12px; color: var(--success); margin-top: 8px; min-height: 18px; }
    .status.error { color: var(--error); }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar button { font-size: 12px; padding: 6px 12px; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <h1>RSS<span>:</span>BOOK</h1>
  <div class="subtitle" data-i18n="optionsTitle"></div>

  <h2 data-i18n="optionsGlobal"></h2>
  <div class="settings-section">
    <label>
      <input type="checkbox" id="updateOnStartup" checked>
      <span data-i18n="optionsStartupUpdate"></span>
    </label>
    <label>
      <span data-i18n="optionsGlobalInterval"></span>
      <input type="number" id="globalInterval" value="0" min="0">
    </label>
    <label>
      <span data-i18n="optionsRootFolder"></span>
      <input type="text" id="rootFolderName" value="RSS">
    </label>
    <div class="info-box" data-i18n="optionsFolderInfo"></div>
    <label>
      <input type="checkbox" id="deleteBookmarks">
      <span data-i18n="optionsDeleteBookmarks"></span>
    </label>
    <div class="info-box" data-i18n="optionsDeleteBookmarksInfo"></div>
  </div>
  <button id="saveSettings" data-i18n="optionsSave"></button>
  <div id="settingsStatus" class="status"></div>

  <h2 data-i18n="optionsAddFeed"></h2>
  <div class="add-section">
    <input id="feedUrl" type="url" placeholder="https://example.com/feed.xml">
    <button id="addBtn" class="primary" data-i18n="optionsAdd"></button>
  </div>

  <h2 data-i18n="optionsFeeds"></h2>
  <div class="toolbar">
    <button id="importOPMLBtn" data-i18n="optionsImportOPML"></button>
    <button id="exportOPMLBtn" data-i18n="optionsExportOPML"></button>
    <button id="exportAllFoldersBtn" data-i18n="optionsExportAllFolders"></button>
    <input type="file" id="opmlFileInput" accept=".opml,.xml,.txt">
  </div>
  <div id="feedList"></div>
  <div id="feedStatus" class="status"></div>

  <script src="options.js" type="module"></script>
</body>
</html>
